<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">


    <style>
        /* 1. Hero Section & Title Effects */
        .hero {
            height: 100vh;
            background-image: url('nasa.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: rgb(158, 157, 137);
        }

        .hero h2 {
            font-size: 100px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            /* Cool neon glow effect */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.2);
            transition: all 0.5s ease;
        }

        .hero h2:hover {
            color: #fff;
            text-shadow: 0 0 20px #fff, 0 0 40px #00d4ff;
            transform: scale(1.05);
        }

        /* 2. Gallery & Hover Effects */
        .gallery {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("starts.avif");
            min-height: 100vh;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            padding: 80px 0;
        }

        .card-img-fixed {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Bouncy effect */
            cursor: pointer;
        }

        /* Zoom and Brighten on Hover */
        .card-img-fixed:hover {
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
            filter: brightness(1.1);
            z-index: 10;
        }

        /* 3. Navbar Fixes */
        .custom-nav {
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .hero h2 {
                font-size: 45px;
            }
        }

        /* Smooth Scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>    
</head>

<body>

    <div>

        <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Space</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#gallery">Gallery</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div class="hero">
        <div class="container">
            <h2>Welcome To Space Gallary</h2>
        </div>
    </div>
    <div class="gallery" id="gallery">
        <div class="container">
            <div class="row justify-content-center gx-5">
                <div class="col-md-4 mb-4">
                    <img src="d1.jfif" class="img-fluid img-thumbnail card-img-fixed" alt="Image 1">
                </div>
                <div class="col-md-4 mb-4">
                    <img src="d2.webp" class="img-fluid img-thumbnail card-img-fixed" alt="Image 2">
                </div>
                <div class="col-md-4 mb-4">
                    <img src="d4.jpg" class="img-fluid img-thumbnail card-img-fixed" alt="Image 3">
                </div>
                <div class="col-md-4 mb-4">
                    <img src="d5.jfif" class="img-fluid img-thumbnail card-img-fixed" alt="Image 1">
                </div>
                <div class="col-md-4 mb-4">
                    <img src="d7.jfif" class="img-fluid img-thumbnail card-img-fixed" alt="Image 2">
                </div>
                <div class="col-md-4 mb-4">
                    <img src="d8.jfif" class="img-fluid img-thumbnail card-img-fixed" alt="Image 3">
                </div>

            </div>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
